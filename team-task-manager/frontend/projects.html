<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Task Manager - Projects</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">Team Task Manager</div>
            <div class="nav-menu">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="projects.html" class="nav-link active">Projects</a>
                <a href="tasks.html" class="nav-link">My Tasks</a>
                <div class="nav-user">
                    <span id="userName"></span>
                    <button id="logoutBtn" class="btn btn-secondary btn-small">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <div class="page-header">
            <h1>Projects</h1>
            <div id="adminControls" style="display: none;">
                <button id="createProjectBtn" class="btn btn-primary">+ New Project</button>
            </div>
        </div>

        <!-- Projects Grid -->
        <div id="projectsContainer" class="projects-grid">
            <!-- Projects will be loaded here -->
        </div>
    </div>

    <!-- Create Project Modal -->
    <div id="projectModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create New Project</h2>
                <button class="close-btn">&times;</button>
            </div>
            <form id="projectForm">
                <div class="form-group">
                    <label for="projectTitle">Project Title:</label>
                    <input type="text" id="projectTitle" name="title" required>
                </div>
                <div class="form-group">
                    <label for="projectDescription">Description:</label>
                    <textarea id="projectDescription" name="description"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">Create Project</button>
                    <button type="button" class="btn btn-secondary close-modal-btn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Project Details Modal -->
    <div id="projectDetailsModal" class="modal" style="display: none;">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h2 id="detailsProjectTitle"></h2>
                <button class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <p id="detailsProjectDescription"></p>
                
                <!-- Team Members Section -->
                <div id="teamMembersSection" style="display: none;">
                    <h3>Team Members</h3>
                    <div id="teamMembersList"></div>
                    <div id="adminMemberControls" style="display: none;">
                        <button id="addMemberBtn" class="btn btn-primary btn-small">+ Add Member</button>
                    </div>
                </div>

                <!-- Tasks Section -->
                <h3>Tasks in this Project</h3>
                <button id="createTaskBtn" class="btn btn-primary btn-small">+ Create Task</button>
                <table class="tasks-table">
                    <thead>
                        <tr>
                            <th>Task</th>
                            <th>Status</th>
                            <th>Assigned To</th>
                            <th>Due Date</th>
                        </tr>
                    </thead>
                    <tbody id="projectTasksList">
                        <!-- Tasks will be loaded here -->
                    </tbody>
                </table>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary close-modal-btn">Close</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/projects.js"></script>
</body>
</html>
